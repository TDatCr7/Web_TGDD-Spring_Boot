<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${category != null ? category.name : 'Danh mục'}">Danh mục</title>
    <style>
        body{margin:0;font-family:Arial,sans-serif;background:#f5f5f5}
        .topbar{background:#ffd500;padding:14px 24px;font-size:26px;font-weight:700}
        .menu{background:#111;color:#fff;padding:10px 24px;display:flex;gap:18px;flex-wrap:wrap}
        .menu a{color:#fff;text-decoration:none}
        .container{width:1200px;max-width:95%;margin:24px auto}
        .title{font-size:28px;font-weight:700;margin-bottom:18px}
        .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
        .card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .card img{width:100%;height:220px;object-fit:contain}
        .name{font-size:18px;font-weight:700;min-height:48px;margin:12px 0 8px}
        .price{color:#d70018;font-size:22px;font-weight:700}
        .old{color:#777;text-decoration:line-through;font-size:14px;margin-left:8px}
        .brand{font-size:14px;color:#666}
        .card a{text-decoration:none;color:inherit}
    </style>
</head>
<body>
<div class="topbar">Thế Giới Di Động</div>

<div class="menu">
    <a th:href="@{/static}">Trang chủ</a>
    <a th:each="c : ${categories}" th:href="@{/templates/category/{slug}(slug=${c.slug})}" th:text="${c.name}"></a>
</div>

<div class="container">
    <div class="title" th:text="${category != null ? category.name : 'Danh mục sản phẩm'}"></div>

    <div class="grid">
        <div class="card" th:each="product : ${products}">
            <a th:href="@{/templates/product/{slug}(slug=${product.slug})}">
                <img th:src="${product.thumbnailUrl}" alt="">
                <div class="name" th:text="${product.name}"></div>
            </a>
            <div class="brand">Hãng: <span th:text="${product.brand.name}"></span></div>
            <div class="price">
                <span th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' đ'"></span>
                <span class="old"
                      th:if="${product.originalPrice != null}"
                      th:text="${#numbers.formatDecimal(product.originalPrice,0,'COMMA',0,'POINT')} + ' đ'"></span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
