<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Đăng nhập</title></head>
<body>
<div th:replace="fragments/site-header :: siteHeader(${categories})"></div>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f3f3}.auth-wrap{max-width:480px;margin:30px auto;background:#fff;padding:26px;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
input{width:100%;height:44px;padding:0 12px;margin-top:8px;border:1px solid #d9d9d9;border-radius:10px}.btn{width:100%;height:46px;border:none;border-radius:12px;background:#ffd500;font-weight:800;cursor:pointer;margin-top:16px}
.flash{padding:10px 12px;border-radius:10px;margin-bottom:12px}.err{background:#fff1f0;color:#d93025}.ok{background:#edfdf3;color:#027a48}label{display:block;margin-top:10px;font-weight:700}
a{text-decoration:none}
</style>
<div class="auth-wrap">
    <h2>Đăng nhập</h2>
    <div th:if="${param.error}" class="flash err">Email hoặc mật khẩu không đúng.</div>
    <div th:if="${successMessage}" class="flash ok" th:text="${successMessage}"></div>
    <form th:action="@{/auth/login}" method="post">
        <label>Email</label>
        <input type="email" name="username" placeholder="Nhập email" required>
        <label>Mật khẩu</label>
        <input type="password" name="password" placeholder="Nhập mật khẩu" required>
        <button class="btn" type="submit">Đăng nhập</button>
    </form>
    <p>Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay</a></p>
</div>
<div th:replace="fragments/footer :: siteFooter"></div>
</body>
</html>
