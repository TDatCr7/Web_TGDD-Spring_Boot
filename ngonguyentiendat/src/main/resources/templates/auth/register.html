<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Đăng ký</title></head>
<body>
<div th:replace="fragments/site-header :: siteHeader(${categories})"></div>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f3f3}.auth-wrap{max-width:560px;margin:30px auto;background:#fff;padding:26px;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
input{width:100%;height:44px;padding:0 12px;margin-top:8px;border:1px solid #d9d9d9;border-radius:10px}.btn{height:46px;border:none;border-radius:12px;background:#ffd500;font-weight:800;cursor:pointer;padding:0 18px}.btn-secondary{background:#eef5ff}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.flash{padding:10px 12px;border-radius:10px;margin-bottom:12px}.err{background:#fff1f0;color:#d93025}.ok{background:#edfdf3;color:#027a48}label{display:block;margin-top:10px;font-weight:700}.actions{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
a{text-decoration:none}
</style>
<div class="auth-wrap">
    <h2>Đăng ký tài khoản</h2>
    <div th:if="${errorMessage}" class="flash err" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="flash ok" th:text="${successMessage}"></div>
    <form th:object="${registerRequest}" th:action="@{/auth/register/send-otp}" method="post">
        <label>Họ tên</label>
        <input type="text" th:field="*{fullName}" required>
        <div class="row">
            <div><label>Email</label><input type="email" th:field="*{email}" required></div>
            <div><label>Số điện thoại</label><input type="text" th:field="*{phoneNumber}"></div>
        </div>
        <div class="row">
            <div><label>Mật khẩu</label><input type="password" th:field="*{password}" required></div>
            <div><label>Xác nhận mật khẩu</label><input type="password" th:field="*{confirmPassword}" required></div>
        </div>
        <div class="actions">
            <button class="btn btn-secondary" type="submit">Gửi OTP email</button>
        </div>
    </form>

    <form th:object="${registerRequest}" th:action="@{/auth/register/verify}" method="post">
        <label>Mã OTP</label>
        <input type="text" th:field="*{otpCode}" placeholder="Nhập OTP đã gửi qua email" required>
        <div class="actions"><button class="btn" type="submit">Xác nhận tạo tài khoản</button></div>
    </form>
    <p>Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a></p>
</div>
<div th:replace="fragments/footer :: siteFooter"></div>
</body>
</html>
